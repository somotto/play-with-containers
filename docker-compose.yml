services:
  # PostgreSQL for Inventory
  inventory-db:
    image: postgres:14-alpine
    container_name: inventory-db
    environment:
      POSTGRES_USER: ${INVENTORY_DB_USER}
      POSTGRES_PASSWORD: ${INVENTORY_DB_PASSWORD}
      POSTGRES_DB: ${INVENTORY_DB_NAME}
    volumes:
      - inventory-db:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INVENTORY_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # PostgreSQL for Billing
  billing-db:
    image: postgres:14-alpine
    container_name: billing-db
    environment:
      POSTGRES_USER: ${BILLING_DB_USER}
      POSTGRES_PASSWORD: ${BILLING_DB_PASSWORD}
      POSTGRES_DB: ${BILLING_DB_NAME}
    volumes:
      - billing-db:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BILLING_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # RabbitMQ
  rabbit-queue:
    image: rabbitmq:3-management-alpine
    container_name: rabbit-queue
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # Inventory Service
  inventory-app:
    build:
      context: ./srcs/inventory-app
      dockerfile: Dockerfile
    image: inventory-app
    container_name: inventory-app
    environment:
      APP_PORT: ${INVENTORY_APP_PORT}
      INVENTORY_DB_USER: ${INVENTORY_DB_USER}
      INVENTORY_DB_PASSWORD: ${INVENTORY_DB_PASSWORD}
      INVENTORY_DB_NAME: ${INVENTORY_DB_NAME}
      INVENTORY_DB_HOST: inventory-db
    depends_on:
      inventory-db:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  # Billing Service
  billing-app:
    build:
      context: ./srcs/billing-app
      dockerfile: Dockerfile
    image: billing-app
    container_name: billing-app
    environment:
      BILLING_DB_USER: ${BILLING_DB_USER}
      BILLING_DB_PASSWORD: ${BILLING_DB_PASSWORD}
      BILLING_DB_NAME: ${BILLING_DB_NAME}
      BILLING_DB_HOST: billing-db
      RABBITMQ_HOST: rabbit-queue
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
    depends_on:
      billing-db:
        condition: service_healthy
      rabbit-queue:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  # API Gateway
  api-gateway-app:
    build:
      context: ./srcs/api-gateway-app
      dockerfile: Dockerfile
    image: api-gateway-app
    container_name: api-gateway-app
    environment:
      APP_PORT: ${APIGATEWAY_PORT}
      INVENTORY_APP_HOST: inventory-app
      INVENTORY_APP_PORT: ${INVENTORY_APP_PORT}
      RABBITMQ_HOST: rabbit-queue
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
    ports:
      - "${APIGATEWAY_PORT}:${APIGATEWAY_PORT}"
    volumes:
      - api-gateway-app:/var/log/api-gateway
    depends_on:
      - inventory-app
      - rabbit-queue
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  inventory-db:
  billing-db:
  api-gateway-app:
